name = "parts-worker"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "USER_PSYCHE", class_name = "UserPsyche" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserPsyche"]

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"

[env.development]
vars = { ENVIRONMENT = "development" }
