name = "parts-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "parts-worker-production"
routes = [
  { pattern = "api.parts.dev/*", zone_name = "parts.dev" }
]

[[durable_objects.bindings]]
name = "USER_PSYCHE"
class_name = "UserPsyche"
script_name = "parts-worker"

[[vectorize]]
binding = "VECTORIZE"
index_name = "parts-insights"

[[ai]]
binding = "AI"

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.ts"]

[build.upload]
format = "modules"
main = "./dist/index.js"

[env.development]
durable_objects.bindings = [
  { name = "USER_PSYCHE", class_name = "UserPsyche" }
]

[vars]
ENVIRONMENT = "production"
